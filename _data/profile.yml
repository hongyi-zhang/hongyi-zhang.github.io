  intro:
    - I am a senior research scientist at PokeBot, working towards AGI in the physical world. I spent 7 years at ByteDance, where I built a production-level browser-use agent framework, trained LLMs, and invented an MPC-based online bidding system to power ByteDance's multi-billion dollar ad business.
    - I obtained my Ph.D. in <a href="https://bcs.mit.edu/">Brain and Cognitive Sciences (BCS)</a> and <a href="https://lids.mit.edu/">Laboratory for Information and Decision Systems (LIDS)</a> at MIT advised by Prof. <a href="https://optml.mit.edu/">Suvrit Sra</a>. I got my B.S. in Machine Intelligence from Peking University, advised by Prof. <a href="http://www.liweiwang-pku.com/">Liwei Wang</a>. I had three research internships, two at Facebook AI Research (FAIR) and one at Toyota Technological Institute at Chicago (TTIC).
    - See below for my representative research projects.

  updates:
    - date: 2026-06
      title: Embodied AI Research
      description: I have joined PokeBot Inc. as a senior research scientist. Next plan: Physical AGI :)

  projects:
    - title: "Mixup: Beyond Empirical Risk Minimization"
      authors: [<b>Hongyi Zhang</b>, Moustafa Cisse, Yann N. Dauphin, David Lopez-Paz]
      image: /assets/images/mixup.jpg
      description: Mixup is a simple yet effective data augmentation technique that improves the generalization and robustness of machine learning models by blending together multiple training examples. It is <b>the most cited data augmentation technique</b> in machine learning.
      tags: [data augmentation, generalization]
      venue: ICLR 2018
      url: "https://openreview.net/forum?id=r1Ddp1-Rb"
      links:
        - label: Paper
          url: "https://openreview.net/forum?id=r1Ddp1-Rb"
        - label: Code
          url: "https://github.com/hongyi-zhang/mixup"
    - title: "Fixup Initialization: Residual Learning Without Normalization"
      authors: [<b>Hongyi Zhang</b>, Yann N. Dauphin, Tengyu Ma]
      image: /assets/images/fixup.jpg
      description: We prove that normalization modules stabilize the training of residual networks because they avoid the exploding gradient problem in vanilla initialization, and propose a new initialization method that allows for <b>stable and efficient residual learning without normalization</b>.
      tags: [deep learning, optimization]
      venue: ICLR 2019
      url: "https://openreview.net/forum?id=H1gsz30cKX"
      links:
        - label: Paper
          url: "https://openreview.net/forum?id=H1gsz30cKX"
        - label: Code
          url: "https://github.com/hongyi-zhang/Fixup"
    - title: First-order Methods for Geodesically Convex Optimization
      authors: [<b>Hongyi Zhang</b>, Suvrit Sra]
      image: /assets/images/rieopt.jpg
      description: We derive a novel trigonometric inequality for Riemannian manifolds, which is a generalization of "law of cosines" in Euclidean space, and is crucial for the analysis of Riemannian optimization algorithms. The inequality enables us to establish <b>the first-ever iteration complexity bounds</b> for first-order optimization methods on geodesically convex functions.
      tags: [optimization, theory]
      venue: COLT 2016
      url: "https://proceedings.mlr.press/v49/zhang16b.pdf"
      links:
        - label: Paper
          url: "https://proceedings.mlr.press/v49/zhang16b.pdf"

