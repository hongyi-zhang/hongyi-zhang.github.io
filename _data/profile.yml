  intro:
    - 我是破壳机器人（PokeBot）的资深科学家，正在努力实现物理世界AGI。此前，我在字节跳动工作了7年，负责构建生产级的浏览器使用智能体框架，训练大语言模型，研发 MPC 在线竞价系统，以支撑字节跳动数百亿美金的广告业务。
    - 我于 2019 年获得麻省理工学院<a href="https://bcs.mit.edu/">脑与认知科学 (BCS)</a>和<a href="https://lids.mit.edu/">信息与决策系统 (LIDS)</a>博士学位，导师为 <a href="https://optml.mit.edu/">Suvrit Sra</a> 教授。我本科毕业于北京大学智能科学系，导师为 <a href="http://www.liweiwang-pku.com/">王立威</a> 教授。我在 Facebook AI Research (FAIR) 和丰田科技研究所 (TTIC) 进行了三段研究实习。
    - 我的代表性研究项目包括 Mixup, Fixup, Riemannian Optimization 等。

  updates:
    - date: 2026-06
      title: 具身智能研究
      description: 我作为资深科学家加入了破壳机器人。下一步计划：物理世界AGI :)

  projects:
    - title: "Mixup: Beyond Empirical Risk Minimization"
      authors: [<b>Hongyi Zhang</b>, Moustafa Cisse, Yann N. Dauphin, David Lopez-Paz]
      image: /assets/images/mixup.jpg
      description: Mixup 是一种能提升机器学习模型泛化能力和鲁棒性的数据增强技术，通过将多个训练样本混合在一起，生成新的训练样本。它简单有效，是机器学习领域<b>引用量最多的数据增强技术</b>。
      tags: [data augmentation, generalization]
      venue: ICLR 2018
      url: "https://openreview.net/forum?id=r1Ddp1-Rb"
      links:
        - label: Paper
          url: "https://openreview.net/forum?id=r1Ddp1-Rb"
        - label: Code
          url: "https://github.com/hongyi-zhang/mixup"
    - title: "Fixup Initialization: Residual Learning Without Normalization"
      authors: [<b>Hongyi Zhang</b>, Yann N. Dauphin, Tengyu Ma]
      image: /assets/images/fixup.jpg
      description: 我们证明了归一化模块稳定了残差网络的训练，是因为它们避免了默认初始化中的梯度爆炸问题。我们根据第一性原理提出了一种新的初始化方法，使得深度残差网络<b>即使没有归一化模块也可以稳定且高效地进行残差学习</b>。
      tags: [deep learning, optimization]
      venue: ICLR 2019
      url: "https://openreview.net/forum?id=H1gsz30cKX"
      links:
        - label: Paper
          url: "https://openreview.net/forum?id=H1gsz30cKX"
        - label: Code
          url: "https://github.com/hongyi-zhang/Fixup"
    - title: First-order Methods for Geodesically Convex Optimization
      authors: [<b>Hongyi Zhang</b>, Suvrit Sra]
      image: /assets/images/rieopt.jpg
      description: 我们推导出了一个新颖的黎曼流形上的三角不等式，它是欧几里得空间中“余弦定理”的推广，对于分析黎曼优化算法至关重要。该不等式使得我们<b>首次证明了一阶优化方法在黎曼流形上的迭代复杂度上界</b>。
      tags: [optimization, theory]
      venue: COLT 2016
      url: "https://proceedings.mlr.press/v49/zhang16b.pdf"
      links:
        - label: Paper
          url: "https://proceedings.mlr.press/v49/zhang16b.pdf"

